# Lychee configuration file
# Documentation: https://github.com/lycheeverse/lychee#configuration-file

# Maximum number of retries per link
max_retries = 3

# Maximum number of concurrent requests
max_concurrency = 10

# User agent string
user_agent = "Mozilla/5.0 (compatible; Lychee/0.15; +https://github.com/lycheeverse/lychee)"

# Accept these HTTP status codes as valid
# 403 is added because some sites block automated checkers but work for users
# Examples: biorxiv.org, medium.com, sciencedirect.com, hpc.ucdavis.edu, support.rstudio.com
# 502 is added because some sites (like Springer) occasionally have gateway issues but are valid
# 415 is added because some sites (e.g. equator-network.org) reject lychee's request
# media type but serve fine for humans
accept = [200, 201, 202, 203, 204, 206, 301, 302, 303, 307, 308, 403, 415, 429, 502]

# Timeout per request (in seconds)
timeout = 20

# Exclude template URLs that users should replace
exclude = [
  "https://github.com/YOUR-USERNAME/.*",
  "https://YOUR-USERNAME.github.io/.*",
  "https://your-username.github.io/.*",
  # Example placeholder URL in documentation
  "https://ucd-serg.github.io/YOURPROJECT",
  # Broken link in commented-out HTML (false positive)
  "https://beierlab.com/.*",
  # Old RStudio blog moved to posit.co; frequently times out in CI
  "https://blog.rstudio.com/.*",
  # Old RStudio support moved to posit.co; returns 403 for automated checks
  "https://support.rstudio.com/.*",
  "https://support.posit.co/.*",
  # Stanford grant writing page times out in CI
  "https://grantwriting.stanford.edu/.*",
  # Publisher cookie-consent interstitials: resolve fine for humans but
  # intermittently fail automated checks because the redirect chain ends on a
  # "cookies_not_supported" page (same rationale as the timeouts above).
  "https://www\\.nature\\.com/articles/.*",
  "https://link\\.springer\\.com/.*",
  "http://localhost.*",
  "https://localhost.*",
  "http://127.0.0.1.*",
  "https://127.0.0.1.*",
  # GitHub PR review pages require authentication
  "https://github.com/pulls/review-requested.*",
  "https://github.com/.*/pulls\\?q=.*review-requested.*",
  # Example preview URLs in documentation (not real URLs)
  "https://preview.*",
  "https://preview/.*"
]
