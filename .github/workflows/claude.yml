# Calls the shared reusable Claude Code workflow in d-morrison/gha.
# Requires the CLAUDE_CODE_OAUTH_TOKEN repository secret, passed explicitly
# (not `secrets: inherit`): the reusable workflow is in the d-morrison user
# account while this repo is in the UCD-SERG org, and cross-owner `inherit`
# silently passes an empty token. SUBMODULES_TOKEN / WORKFLOW_TOKEN are
# optional and resolve to empty when unset.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Cheap caller-side gate: only invoke the reusable workflow when an @claude
    # mention is actually present, so unrelated comments / reviews / issue
    # events don't spawn a (skipped) reusable-workflow run. The reusable
    # workflow still enforces the trusted-author gate (OWNER/MEMBER/COLLABORATOR).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write       # dispatch the review workflow via `gh workflow run`
    uses: d-morrison/gha/.github/workflows/claude.yml@v1
    # Pass secrets explicitly — cross-owner `secrets: inherit` drops them (see
    # the header comment). SUBMODULES_TOKEN / WORKFLOW_TOKEN are optional and
    # resolve to empty when unset.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
      WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
    with:
      # The lab manual is a Quarto book, so Claude needs Quarto to render
      # chapters. Dependencies are installed from DESCRIPTION as RSPM binaries
      # (the reusable workflow's default) rather than via a renv restore, which
      # would also need the preview workflow's system libraries.
      install-quarto: true
      # Check out the .ai-config submodule so the committed
      # .claude/skills -> ../.ai-config/skills symlink resolves and the bot can
      # invoke the shared skills by name. ai-config is public, so no token is
      # needed. (Without this the symlink dangles and claude-code-action's
      # restoreConfigFromBase errors with ENOENT statx '.claude/skills'.)
      checkout-submodules: true
      prompt-addendum: |
        This is the UCD-SERG lab manual, a Quarto book. Follow the manual's own
        coding-style and coding-practices conventions. Keep prose ASCII: the
        check-non-standard-chars workflow flags non-standard characters such as
        curly quotes and en/em dashes. Before committing a changed chapter, run
        spelling::spell_check_files() on it and, where feasible, `quarto render`
        the affected .qmd.
