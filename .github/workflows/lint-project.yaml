# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: lint-project.yaml

permissions: read-all

jobs:
  lint-project:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libpng-dev libfontconfig1-dev libjpeg-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libtiff5-dev libwebp-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Install lms (shared linter config) from local subdir
        # The root .lintr.R calls lms::default_linters(), so lms must be
        # installed before linting. lms's deps (lintr, rex) are restored
        # from renv.lock by setup-renv above, so no extra install is needed.
        run: R CMD INSTALL lms
        shell: bash

      - name: Lint root directory
        run: lintr::lint_dir()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
